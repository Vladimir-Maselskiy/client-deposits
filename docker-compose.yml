services:
  db:
    image: postgres:16
    container_name: client-deposits-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: client_deposits
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d client_deposits"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: client-deposits-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/client_deposits?schema=public
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             npm run start"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
